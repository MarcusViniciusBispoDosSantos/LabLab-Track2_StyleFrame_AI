name: Publish Track 2 Docker Image to GHCR

on:
  workflow_dispatch:
    inputs:
      install_local_model:
        description: "Build self-contained local BLIP image. Use true for stronger no-key submission; false for fast heuristic/API image."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image name
        id: vars
        run: |
          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER_LOWER}/styleframe-ai-track2" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            INSTALL_LOCAL_MODEL=${{ github.event.inputs.install_local_model || 'false' }}
          tags: |
            ${{ steps.vars.outputs.image }}:latest
            ${{ steps.vars.outputs.image }}:${{ github.sha }}

      - name: Inspect image manifest
        run: |
          docker buildx imagetools inspect ${{ steps.vars.outputs.image }}:latest
          docker buildx imagetools inspect ${{ steps.vars.outputs.image }}:latest | grep -q "linux/amd64"

      - name: Confirm final image URL
        run: |
          echo "Docker image ready:"
          echo "${{ steps.vars.outputs.image }}:latest"
