name: Track 2 Online Check

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  docker-contract-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          set -eux
          pwd
          ls -la
          find . -maxdepth 3 -type f | sort

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build linux/amd64 image
        run: |
          set -eux
          docker buildx build \
            --platform linux/amd64 \
            -t track2-styleframe-ai:ci \
            --load \
            .

      - name: Create judge-style input
        run: |
          set -eux
          mkdir -p input output
          cat > input/tasks.json <<'JSON'
          [
            {
              "task_id": "contract1",
              "video_url": "file:///input/nonexistent_test_video.mp4",
              "styles": ["formal", "sarcastic", "humorous_tech", "humorous_non_tech"]
            }
          ]
          JSON
          cat input/tasks.json

      - name: Run container like judge
        run: |
          set -eux
          docker run --rm \
            -e CAPTION_BACKEND=heuristic \
            -e FRAME_SAMPLE_COUNT=4 \
            -v "$PWD/input:/input" \
            -v "$PWD/output:/output" \
            track2-styleframe-ai:ci

      - name: Validate output
        run: |
          set -eux
          ls -la output
          cat output/results.json
          python scripts/validate_results.py input/tasks.json output/results.json
          python -m json.tool output/results.json

      - name: Confirm linux/amd64 architecture
        run: |
          set -eux
          ARCH="$(docker image inspect track2-styleframe-ai:ci --format '{{.Architecture}}')"
          echo "Architecture: $ARCH"
          if [ "$ARCH" != "amd64" ]; then
            echo "Expected amd64 image, got $ARCH"
            exit 1
          fi

      - name: Confirm no .env inside image
        run: |
          set -eux
          docker run --rm track2-styleframe-ai:ci sh -c 'ls -la /app && test ! -f /app/.env && echo "OK: no .env inside image"'
